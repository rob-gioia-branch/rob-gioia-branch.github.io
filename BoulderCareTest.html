<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Comparison Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .button {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: opacity 0.2s;
        }

        .branch-btn {
            background-color: #e62429; /* Marvel Red */
        }

        .regular-btn {
            background-color: #007aff; /* Apple Blue */
        }

        .button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Link Test</h1>
        
        <a href="https://marvel-comics.app.link/RDY5pMrVz2b$deeplink_no_attribution=true" class="button branch-btn">
            Branch Link
        </a>

        <a href="https://apps.apple.com/us/app/boulder-care/id1437606990" class="button regular-btn">
            Regular Link
        </a>
    </div>

</body>
</html>
